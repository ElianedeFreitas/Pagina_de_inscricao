<html>
<head>
<title>Ficha de Inscrição</title>
</head>

<body>

<h2>Ficha de Inscrição</h2>

<form>

<table border="1" width="100%">

<tr>
<td>Nome do candidato:</td>
<td colspan="5"><input type="text"></td>
</tr>

<tr>
<td>Endereço:</td>
<td colspan="5"><input type="text"></td>
</tr>

<tr>
<td>CEP:</td>
<td><input type="text"></td>

<td>Cidade:</td>
<td>
<select>
<option>Brasília</option>
<option>Goiânia</option>
<option>São Paulo</option>
</select>
</td>

<td>UF:</td>
<td>
<select>
<option>DF</option>
<option>GO</option>
<option>SP</option>
</select>
</td>
</tr>

<tr>
<td>Telefone:</td>
<td colspan="5"><input type="text"></td>
</tr>

<tr>
<td>RG:</td>
<td><input type="text"></td>

<td>CPF:</td>
<td><input type="text"></td>

<td>Sexo:</td>
<td>
<input type="radio" name="sexo">Mas.
<input type="radio" name="sexo">Fem.
</td>
</tr>

<tr>
<td>Escolaridade:</td>
<td>
<select>
<option>Ensino Médio</option>
<option>Ensino Técnico</option>
<option>Ensino Superior</option>
</select>
</td>

<td>Email:</td>
<td colspan="3"><input type="text"></td>
</tr>

<tr>
<td>Curso:</td>
<td>
<select>
<option>Administração</option>
<option>Direito</option>
<option>Análise e Desenvolvimento de Sistemas</option>
</select>
</td>

<td>Senha:</td>
<td colspan="3"><input type="password"></td>
</tr>

<tr>
<td colspan="6" align="center" bgcolor="blue">
<input type="submit" value="CADASTRAR">
</td>
</tr>

</table>

</form>

</body>
</html>
